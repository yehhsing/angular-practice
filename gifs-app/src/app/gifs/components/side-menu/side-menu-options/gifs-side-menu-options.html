<div id="nav" class="w-full px-6">
  <!-- bg-blue-800 -->

  @for (item of menuOptions; track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="bg-blue-800"
      class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150"
    >
      <div>
        <!-- <i class="{{ item.icon }}"></i> -->
        <i [class]="item.icon"></i>
      </div>
      <div class="flex flex-col">
        <span class="text-lg font-bold leading-5 text-white">{{ item.label }}</span>
        <span class="text-sm text-white/50 hidden md:block">{{ item.subLable }}</span>
      </div>
    </a>
  }

  @for (item of gifService.searchHistoryKeys(); track item) {
    <!-- <a
      [routerLink]="['/search', item]"
      routerLinkActive="bg-blue-800"
      class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150"
    >
      <div>
        <i class="fa-solid fa-clock-rotate-left"></i>
      </div>
      <div class="flex flex-col">
        <span class="text-lg font-bold leading-5 text-white">{{ item }}</span>
        <span class="text-sm text-white/50 hidden md:block">Search history</span>
      </div>
    </a> -->

    <a
      [routerLink]="['/dashboard/history/', item]"
      routerLinkActive="bg-blue-800"
      class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150"
    >
      <div>
        <!-- <i class="{{ item.icon }}"></i> -->
        <i class="fa-solid fa-clock-rotate-left"></i>
      </div>
      <div class="flex flex-col">
        <span class="text-lg font-bold leading-5 text-white">{{ item }}</span>
      </div>
    </a>
  }
</div>
