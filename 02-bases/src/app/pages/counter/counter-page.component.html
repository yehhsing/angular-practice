<div class="counter-page">
  <h1>Hola Mundo!</h1>
  <h1>Counter Page</h1>
  <hr />
  <p>Current Count: {{ count }}</p>
  <p>Current Count Signal: {{ counterSignal() }}</p>
  <button (click)="increaseBy(1)">+1</button>
  <button (click)="reset()">Reset</button>
  <button (click)="increaseBy(-1)">-1</button>
</div>
